<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1, viewport-fit=cover, user-scalable=no">
<title>Atlas OS</title>

<!-- ===== iPhone "installed app" behaviour ===== -->
<meta name="apple-mobile-web-app-capable" content="yes">
<meta name="apple-mobile-web-app-status-bar-style" content="black-translucent">
<meta name="apple-mobile-web-app-title" content="Atlas">
<meta name="theme-color" content="#0E1116">
<link rel="apple-touch-icon" href="icon.png">

<style>
/* =====================================================================
   ATLAS OS — v0.1 "The Loop"
   Design language: instrument panel. Numbers in monospace carry the
   personality; colour is reserved for data direction (up/flat/down).
   ===================================================================== */
:root{
  --bg:      #0E1116;   /* app background — deep graphite            */
  --surface: #171D24;   /* cards                                      */
  --surface2:#1F2732;   /* inputs, nested blocks                      */
  --line:    #2A3441;   /* hairline borders                           */
  --text:    #E6EBF0;   /* primary text                               */
  --muted:   #8B98A5;   /* secondary text                             */
  --act:     #7FB2E5;   /* interactive accent (steel blue)            */
  --up:      #6FD99B;   /* data: improved vs last time                */
  --down:    #E08A6E;   /* data: below last time                      */
  --flat:    #8B98A5;   /* data: unchanged                            */
  --mono: ui-monospace, "SF Mono", SFMono-Regular, Menlo, monospace;
  --sans: -apple-system, BlinkMacSystemFont, "Segoe UI", Roboto, sans-serif;
}
*{box-sizing:border-box; -webkit-tap-highlight-color:transparent;}
html,body{margin:0; padding:0; background:var(--bg); color:var(--text);
  font-family:var(--sans); font-size:16px; overscroll-behavior-y:none;}
body{padding-bottom:calc(76px + env(safe-area-inset-bottom));}

/* ---------- header ---------- */
header{padding:calc(14px + env(safe-area-inset-top)) 18px 10px;
  display:flex; align-items:baseline; justify-content:space-between;}
.wordmark{font-weight:800; letter-spacing:.14em; font-size:15px;}
.wordmark span{color:var(--act);}
.headdate{font-family:var(--mono); font-size:12px; color:var(--muted);}

/* ---------- layout ---------- */
main{padding:0 14px;}
.card{background:var(--surface); border:1px solid var(--line);
  border-radius:14px; padding:14px; margin-bottom:12px;}
.card h2{margin:0 0 2px; font-size:13px; font-weight:600; color:var(--muted);
  text-transform:uppercase; letter-spacing:.08em;}
.big{font-size:26px; font-weight:800; margin:2px 0 0;}
.sub{color:var(--muted); font-size:13px; margin-top:2px;}
.row{display:flex; align-items:center; gap:10px;}
.spread{display:flex; align-items:center; justify-content:space-between;}

/* ---------- buttons ---------- */
button{font-family:var(--sans); border:none; cursor:pointer;}
.btn{width:100%; padding:15px; border-radius:12px; font-size:16px;
  font-weight:700; background:var(--act); color:#0B1320;}
.btn.secondary{background:var(--surface2); color:var(--text);
  border:1px solid var(--line);}
.btn.danger{background:transparent; color:var(--down);
  border:1px solid var(--down);}
.btn:active{transform:scale(.98);}

/* ---------- delta ticker (the signature element) ---------- */
.delta{font-family:var(--mono); font-size:13px; font-weight:600;
  padding:3px 8px; border-radius:7px; background:var(--surface2);
  white-space:nowrap;}
.delta.up{color:var(--up);} .delta.down{color:var(--down);}
.delta.flat{color:var(--flat);}

/* ---------- metrics quick entry ---------- */
.metrics{display:grid; grid-template-columns:1fr 1fr 1fr; gap:8px;}
.metric{background:var(--surface2); border:1px solid var(--line);
  border-radius:10px; padding:8px 10px;}
.metric label{display:block; font-size:11px; color:var(--muted);
  text-transform:uppercase; letter-spacing:.06em;}
.metric input{width:100%; background:transparent; border:none; color:var(--text);
  font-family:var(--mono); font-size:18px; font-weight:600; padding:2px 0;
  outline:none;}
.metric input::placeholder{color:#3d4a58;}

/* ---------- run progress ---------- */
.bar{height:8px; background:var(--surface2); border-radius:6px;
  overflow:hidden; margin-top:8px;}
.bar > div{height:100%; background:var(--act); border-radius:6px;
  transition:width .3s;}

/* ---------- session logging ---------- */
.exname{font-size:16px; font-weight:700;}
.lastline{font-family:var(--mono); font-size:12px; color:var(--muted);
  margin-top:2px;}
.setrow{display:flex; align-items:center; gap:6px; margin-top:10px;
  opacity:.55;}
.setrow.done{opacity:1;}
.setnum{font-family:var(--mono); font-size:12px; color:var(--muted); width:16px;}
.step{width:34px; height:40px; border-radius:9px; background:var(--surface2);
  border:1px solid var(--line); color:var(--act); font-size:19px;
  font-weight:700; flex:none;}
.val{font-family:var(--mono); font-size:17px; font-weight:700;
  min-width:58px; text-align:center; background:transparent; border:none;
  color:var(--text); padding:0;}
.val.reps{min-width:34px;}
.unit{font-size:11px; color:var(--muted); margin-left:-4px;}
.check{width:44px; height:40px; border-radius:9px; flex:none;
  background:var(--surface2); border:1px solid var(--line);
  color:var(--muted); font-size:18px;}
.setrow.done .check{background:var(--up); border-color:var(--up); color:#0B1320;}
.addset{margin-top:10px; background:transparent; color:var(--act);
  font-size:14px; font-weight:600; padding:6px 0;}

/* ---------- history ---------- */
.hitem{border-bottom:1px solid var(--line); padding:12px 2px;}
.hitem:last-child{border-bottom:none;}
.hdet{margin-top:8px; font-family:var(--mono); font-size:13px;
  color:var(--muted); line-height:1.7;}

/* ---------- bottom nav ---------- */
nav{position:fixed; bottom:0; left:0; right:0; display:flex;
  background:rgba(14,17,22,.92); backdrop-filter:blur(14px);
  border-top:1px solid var(--line);
  padding:8px 0 calc(8px + env(safe-area-inset-bottom));}
nav button{flex:1; background:none; color:var(--muted); font-size:12px;
  font-weight:600; letter-spacing:.04em; padding:8px 0;}
nav button.active{color:var(--act);}
nav .ic{display:block; font-size:19px; margin-bottom:2px;}

.empty{color:var(--muted); text-align:center; padding:28px 10px;
  font-size:14px; line-height:1.6;}
h1.screen{font-size:22px; font-weight:800; margin:6px 4px 14px;}
.note{font-size:12px; color:var(--muted); line-height:1.6; margin-top:10px;}
textarea.io{width:100%; height:110px; background:var(--surface2);
  border:1px solid var(--line); border-radius:10px; color:var(--text);
  font-family:var(--mono); font-size:11px; padding:10px;}
@media (prefers-reduced-motion: reduce){ *{transition:none !important;} }
</style>
</head>
<body>

<header>
  <div class="wordmark">ATLAS<span>&nbsp;OS</span></div>
  <div class="headdate" id="headdate"></div>
</header>

<main id="main"></main>

<nav>
  <button id="nav-today" onclick="go('today')"><span class="ic">◉</span>Today</button>
  <button id="nav-history" onclick="go('history')"><span class="ic">≡</span>History</button>
  <button id="nav-settings" onclick="go('settings')"><span class="ic">⚙︎</span>Settings</button>
</nav>

<script>
/* =====================================================================
   ATLAS OS v0.1 — application code
   Everything lives in one JSON document, saved to localStorage.
   Read top-to-bottom: STATE → HELPERS → FACTS → SCREENS → ACTIONS.
   ===================================================================== */

const STORE_KEY = "atlasos_v1";
const VERSION   = "0.1.0";

/* ---------- 1. STATE: load, save, first-run seed ---------- */

let S = load();

function load(){
  try{
    const raw = localStorage.getItem(STORE_KEY);
    if(raw) return JSON.parse(raw);
  }catch(e){ console.error("load failed", e); }
  return seed();
}
function save(){ localStorage.setItem(STORE_KEY, JSON.stringify(S)); }

/* First run: build the database pre-loaded with YOUR actual program. */
function seed(){
  const ex = (id,name,group,compound)=>({id,name,muscleGroup:group,isCompound:!!compound});
  const exercises = [
    ex("chest-press","Chest Press Machine","chest",1),
    ex("lat-pulldown","Neutral-Grip Lat Pulldown","back",1),
    ex("db-lateral","DB Lateral Raise","shoulders"),
    ex("pec-deck","Pec Deck","chest"),
    ex("cable-row","Seated Cable Row","back",1),
    ex("tri-ext","Tricep Extension","triceps"),
    ex("db-curl","DB Bicep Curl","biceps"),
    ex("squat","Barbell Squat","legs",1),
    ex("hack-squat","Hack Squat","legs",1),
    ex("leg-press","Leg Press","legs",1),
    ex("leg-ext","Leg Extension","legs"),
    ex("ham-curl","Lying Hamstring Curl","legs"),
    ex("lunges","Lunges","legs",1),
    ex("cable-crunch","Cable Crunch","abs"),
    ex("ab-machine","Ab Machine","abs"),
    ex("incline-db","Incline DB Press","chest",1),
    ex("db-shoulder","DB Shoulder Press","shoulders",1),
    ex("dips","Dips","chest",1),
    ex("pull-ups","Pull-Ups","back",1),
    ex("incline-curl","Incline DB Curl","biceps"),
    ex("cgbp","Close-Grip Bench Press","triceps",1),
    ex("oh-tri","Overhead Tricep Extension","triceps"),
    ex("cable-cross","Cable Cross-Body Pull","back"),
    ex("cable-lateral","Cable Lateral Raise","shoulders"),
  ];
  const slot = (exerciseId,targetSets)=>({exerciseId,targetSets,targetRepRange:null});
  const templates = [
    {id:"upper", name:"Upper", slots:[
      slot("chest-press",3), slot("lat-pulldown",3), slot("db-lateral",4),
      slot("pec-deck",3), slot("cable-row",3), slot("tri-ext",3), slot("db-curl",3)]},
    {id:"legs", name:"Legs", slots:[
      slot("hack-squat",3), slot("leg-press",3), slot("leg-ext",3),
      slot("ham-curl",3), slot("lunges",3), slot("cable-crunch",3), slot("ab-machine",3)]},
    {id:"push", name:"Push", slots:[
      slot("incline-db",3), slot("db-shoulder",3), slot("pec-deck",3),
      slot("tri-ext",3), slot("db-lateral",4), slot("dips",3)]},
    {id:"pull", name:"Pull (arms/abs)", slots:[
      slot("pull-ups",3), slot("cable-row",3), slot("incline-curl",3),
      slot("cgbp",3), slot("cable-cross",3), slot("cable-lateral",3),
      slot("cable-crunch",3), slot("ab-machine",3)]},
  ];
  return {
    settings:{units:"kg", weeklyRunTargetKm:15, appVersion:VERSION},
    exercises, templates, sessions:[], dailyMetrics:[], draft:null
  };
}

/* ---------- 2. HELPERS ---------- */

const $  = sel => document.querySelector(sel);
const exById = id => S.exercises.find(e=>e.id===id);
const todayISO = () => { const d=new Date();
  return d.getFullYear()+"-"+String(d.getMonth()+1).padStart(2,"0")+"-"+String(d.getDate()).padStart(2,"0"); };
const fmtW = w => w===0 ? "BW" : (Math.round(w*10)/10)+"";
const esc  = s => String(s).replace(/[&<>"]/g, c=>({"&":"&amp;","<":"&lt;",">":"&gt;",'"':"&quot;"}[c]));

/* Which session does today's weekday suggest? (your actual week) */
const WEEK = {1:"upper", 2:"legs", 3:"RUN", 4:"push", 5:"pull", 6:"LONGRUN", 0:"REST"};

function metricsFor(date){
  let m = S.dailyMetrics.find(x=>x.date===date);
  if(!m){ m={date, bodyweightKg:null, sleepHours:null, runKm:null, notes:null};
    S.dailyMetrics.push(m); }
  return m;
}

/* Sum of run km for the Monday-to-Sunday week containing `date`. */
function weekRunKm(dateStr){
  const iso = d => d.getFullYear()+"-"+String(d.getMonth()+1).padStart(2,"0")
                   +"-"+String(d.getDate()).padStart(2,"0");
  const d = new Date(dateStr+"T12:00:00");
  const day = (d.getDay()+6)%7;                 // 0 = Monday
  const mon = new Date(d); mon.setDate(d.getDate()-day);
  const sun = new Date(mon); sun.setDate(mon.getDate()+6);
  const from = iso(mon), to = iso(sun);
  const total = S.dailyMetrics
    .filter(m => m.date >= from && m.date <= to && m.runKm)
    .reduce((n,m) => n + Number(m.runKm), 0);
  return Math.round(total*10)/10;
}

/* ---------- 3. FACTS: deterministic comparisons, no AI ---------- */

/* Best set = heaviest weight, ties broken by reps. */
function topSet(sets){
  const working = sets.filter(s=>!s.isWarmup);
  if(!working.length) return null;
  return working.reduce((a,b)=> (b.weightKg>a.weightKg ||
    (b.weightKg===a.weightKg && b.reps>a.reps)) ? b : a);
}

/* Most recent saved session (before `beforeDate`) containing this exercise. */
function lastEntryFor(exId, beforeSessionId){
  for(const sess of [...S.sessions].sort((a,b)=>b.date.localeCompare(a.date) || b.id.localeCompare(a.id))){
    if(sess.id===beforeSessionId) continue;
    const entry = sess.entries.find(en=>en.exerciseId===exId && en.sets.length);
    if(entry) return {session:sess, entry};
  }
  return null;
}

/* The delta ticker: compare this session's top set to last time's. */
function deltaFor(exId, sets, excludeSessionId){
  const now = topSet(sets);
  const last = lastEntryFor(exId, excludeSessionId);
  if(!now) return null;
  if(!last) return {cls:"flat", label:"first log"};
  const prev = topSet(last.entry.sets);
  if(!prev) return {cls:"flat", label:"first log"};
  const dw = Math.round((now.weightKg - prev.weightKg)*10)/10;
  if(dw > 0)  return {cls:"up",   label:"▲ +"+dw+" kg"};
  if(dw < 0)  return {cls:"down", label:"▼ "+dw+" kg"};
  const dr = now.reps - prev.reps;
  if(dr > 0)  return {cls:"up",   label:"▲ +"+dr+" rep"+(dr>1?"s":"")};
  if(dr < 0)  return {cls:"down", label:"▼ "+dr+" rep"+(dr<-1?"s":"")};
  return {cls:"flat", label:"― same"};
}

/* ---------- 4. SCREENS ---------- */

let view = "today";
function go(v){ view=v; render(); window.scrollTo(0,0); }

function render(){
  $("#headdate").textContent = new Date().toLocaleDateString("en-AU",
    {weekday:"short", day:"numeric", month:"short"});
  ["today","history","settings"].forEach(v=>
    $("#nav-"+v).classList.toggle("active", view===v ||
      (v==="today" && view==="session")));
  const m = $("#main");
  if(view==="today")    m.innerHTML = TodayScreen();
  if(view==="session")  m.innerHTML = SessionScreen();
  if(view==="history")  m.innerHTML = HistoryScreen();
  if(view==="settings") m.innerHTML = SettingsScreen();
  save();
}

/* ----- TODAY: "what do I need to know / do right now?" ----- */
function TodayScreen(){
  const plan = WEEK[new Date().getDay()];
  const met  = metricsFor(todayISO());
  const wk   = weekRunKm(todayISO());
  const tgt  = S.settings.weeklyRunTargetKm;
  let h = "";

  /* resume an unfinished session, if one exists */
  if(S.draft){
    h += `<div class="card"><h2>In progress</h2>
      <div class="big">${esc(S.draft.name)}</div>
      <div style="margin-top:10px"><button class="btn" onclick="go('session')">Resume session</button></div></div>`;
  } else if(plan==="RUN" || plan==="LONGRUN"){
    h += `<div class="card"><h2>Today</h2>
      <div class="big">${plan==="LONGRUN"?"Long Run":"Run"}</div>
      <div class="sub">Log the distance in km below when you're done.</div></div>`;
  } else if(plan==="REST"){
    h += `<div class="card"><h2>Today</h2><div class="big">Rest</div>
      <div class="sub">Recovery is a training day too. Nothing to log but metrics.</div></div>`;
  } else {
    const t = S.templates.find(t=>t.id===plan);
    h += `<div class="card"><h2>Today</h2>
      <div class="big">${esc(t.name)}</div>
      <div class="sub">${t.slots.length} exercises</div>
      <div style="margin-top:12px"><button class="btn" onclick="startSession('${t.id}')">Start ${esc(t.name)}</button></div></div>`;
  }

  /* start any other session */
  h += `<div class="card"><h2>Or start another session</h2>
    <div class="row" style="flex-wrap:wrap; margin-top:8px">`;
  for(const t of S.templates)
    h += `<button class="btn secondary" style="width:auto; padding:10px 14px; font-size:14px"
      onclick="startSession('${t.id}')">${esc(t.name)}</button>`;
  h += `</div></div>`;

  /* daily metrics quick entry */
  h += `<div class="card"><h2>Today's numbers</h2>
    <div class="metrics" style="margin-top:8px">
      <div class="metric"><label>Weight kg</label>
        <input type="number" inputmode="decimal" step="0.1" placeholder="—"
          value="${met.bodyweightKg ?? ""}" onchange="setMetric('bodyweightKg', this.value)"></div>
      <div class="metric"><label>Sleep h</label>
        <input type="number" inputmode="decimal" step="0.5" placeholder="—"
          value="${met.sleepHours ?? ""}" onchange="setMetric('sleepHours', this.value)"></div>
      <div class="metric"><label>Run km</label>
        <input type="number" inputmode="decimal" step="0.1" placeholder="—"
          value="${met.runKm ?? ""}" onchange="setMetric('runKm', this.value)"></div>
    </div></div>`;

  /* weekly running fact */
  const pct = Math.min(100, tgt ? (wk/tgt*100) : 0);
  h += `<div class="card"><div class="spread"><h2>Running this week</h2>
      <span class="delta ${wk>=tgt?"up":"flat"}">${wk} / ${tgt} km</span></div>
    <div class="bar"><div style="width:${pct}%"></div></div></div>`;

  /* last session summary with deltas */
  const last = [...S.sessions].sort((a,b)=>b.date.localeCompare(a.date)||b.id.localeCompare(a.id))[0];
  if(last){
    h += `<div class="card"><h2>Last session — ${esc(last.name)} · ${last.date}</h2>`;
    for(const en of last.entries){
      const d = deltaFor(en.exerciseId, en.sets, null);
      const ts = topSet(en.sets);
      h += `<div class="spread" style="margin-top:8px">
        <span style="font-size:14px">${esc(exById(en.exerciseId)?.name ?? en.exerciseId)}</span>
        <span class="row"><span class="lastline">${ts?fmtW(ts.weightKg)+"×"+ts.reps:""}</span>
        ${d?`<span class="delta ${d.cls}">${d.label}</span>`:""}</span></div>`;
    }
    h += `</div>`;
  }
  return h;
}

/* ----- SESSION: the logging loop. Speed is the whole point. ----- */
function SessionScreen(){
  const d = S.draft;
  if(!d) return `<div class="empty">No session in progress.</div>`;
  let h = `<div class="spread" style="margin:4px 4px 12px">
    <h1 class="screen" style="margin:0">${esc(d.name)}</h1>
    <button class="btn" style="width:auto; padding:10px 16px; font-size:14px"
      onclick="finishSession()">Finish</button></div>`;

  d.entries.forEach((en, ei)=>{
    const ex = exById(en.exerciseId);
    const last = lastEntryFor(en.exerciseId, null);
    const lastTxt = last
      ? "Last: " + last.entry.sets.map(s=>fmtW(s.weightKg)+"×"+s.reps).join("  ")
      : "First time logging this";
    h += `<div class="card"><div class="spread">
      <div><div class="exname">${esc(ex?.name ?? "?")}</div>
      <div class="lastline">${esc(lastTxt)}</div></div></div>`;
    en.sets.forEach((s, si)=>{
      h += `<div class="setrow ${s.done?"done":""}">
        <span class="setnum">${si+1}</span>
        <button class="step" onclick="bump(${ei},${si},'weightKg',-2.5)">−</button>
        <input class="val" type="number" inputmode="decimal" step="0.5"
          value="${s.weightKg}" onchange="setVal(${ei},${si},'weightKg',this.value)">
        <span class="unit">kg</span>
        <button class="step" onclick="bump(${ei},${si},'weightKg',2.5)">＋</button>
        <button class="step" onclick="bump(${ei},${si},'reps',-1)">−</button>
        <input class="val reps" type="number" inputmode="numeric"
          value="${s.reps}" onchange="setVal(${ei},${si},'reps',this.value)">
        <button class="step" onclick="bump(${ei},${si},'reps',1)">＋</button>
        <button class="check" onclick="toggleDone(${ei},${si})">✓</button>
      </div>`;
    });
    h += `<button class="addset" onclick="addSet(${ei})">+ Add set</button></div>`;
  });

  h += `<button class="btn secondary" onclick="addExercise()">+ Add exercise</button>
        <div style="height:10px"></div>
        <button class="btn danger" onclick="discardSession()">Discard session</button>`;
  return h;
}

/* ----- HISTORY ----- */
function HistoryScreen(){
  let h = `<h1 class="screen">History</h1>`;
  const list = [...S.sessions].sort((a,b)=>b.date.localeCompare(a.date)||b.id.localeCompare(a.id));
  if(!list.length)
    return h + `<div class="card"><div class="empty">No sessions yet.<br>Your first one starts on the Today screen.</div></div>`;
  h += `<div class="card">`;
  for(const sess of list){
    const nsets = sess.entries.reduce((n,e)=>n+e.sets.length,0);
    h += `<div class="hitem" onclick="toggleH('${sess.id}')">
      <div class="spread"><strong>${esc(sess.name)}</strong>
        <span class="lastline">${sess.date} · ${nsets} sets</span></div>
      <div class="hdet" id="h-${sess.id}" style="display:none">`;
    for(const en of sess.entries){
      h += `${esc(exById(en.exerciseId)?.name ?? "?")}: `
        + en.sets.map(s=>fmtW(s.weightKg)+"×"+s.reps).join("  ") + "<br>";
    }
    h += `</div></div>`;
  }
  return h + `</div>`;
}
function toggleH(id){ const el=$("#h-"+id);
  el.style.display = el.style.display==="none" ? "block" : "none"; }

/* ----- SETTINGS ----- */
function SettingsScreen(){
  return `<h1 class="screen">Settings</h1>
  <div class="card"><h2>Weekly run target</h2>
    <div class="row" style="margin-top:8px">
      <input class="val" style="text-align:left; font-size:20px" type="number"
        inputmode="decimal" value="${S.settings.weeklyRunTargetKm}"
        onchange="S.settings.weeklyRunTargetKm=Number(this.value)||0; save();">
      <span class="unit">km</span></div></div>

  <div class="card"><h2>Backup</h2>
    <div class="note">Your data lives only on this phone. Export weekly —
      the file re-imports here or into any future version of Atlas.</div>
    <div style="margin-top:10px"><button class="btn secondary" onclick="exportData()">Export data (.json)</button></div>
    <div style="margin-top:8px"><button class="btn secondary" onclick="$('#importfile').click()">Import data</button>
      <input id="importfile" type="file" accept=".json,application/json"
        style="display:none" onchange="importData(this.files[0])"></div></div>

  <div class="card"><h2>Danger zone</h2>
    <div style="margin-top:8px"><button class="btn danger" onclick="resetAll()">Erase everything</button></div></div>

  <div class="note" style="text-align:center; padding-bottom:16px">
    ATLAS OS v${VERSION} · module: Gym &amp; Running · analyst, not coach</div>`;
}

/* ---------- 5. ACTIONS ---------- */

function setMetric(field, val){
  const m = metricsFor(todayISO());
  m[field] = val==="" ? null : Number(val);
  save(); render();
}

/* Start a session: pre-fill every set with LAST TIME's numbers, so
   matching your previous performance is literally one tap per set.   */
function startSession(templateId){
  if(S.draft && !confirm("Discard the session in progress and start a new one?")) return;
  const t = S.templates.find(t=>t.id===templateId);
  const entries = t.slots.map(slot=>{
    const last = lastEntryFor(slot.exerciseId, null);
    const sets = [];
    for(let i=0; i<slot.targetSets; i++){
      const prev = last ? (last.entry.sets[i] || last.entry.sets[last.entry.sets.length-1]) : null;
      sets.push({weightKg: prev? prev.weightKg : 0, reps: prev? prev.reps : 8,
                 effort:null, isWarmup:false, done:false});
    }
    return {exerciseId: slot.exerciseId, sets};
  });
  S.draft = {id:"s"+Date.now(), date:todayISO(), templateId, name:t.name, notes:null, entries};
  go("session");
}

function bump(ei, si, field, amt){
  const s = S.draft.entries[ei].sets[si];
  s[field] = Math.max(0, Math.round((Number(s[field])+amt)*10)/10);
  render();
}
function setVal(ei, si, field, v){
  S.draft.entries[ei].sets[si][field] = Math.max(0, Number(v)||0); render();
}
function toggleDone(ei, si){
  const s = S.draft.entries[ei].sets[si]; s.done = !s.done; render();
}
function addSet(ei){
  const sets = S.draft.entries[ei].sets;
  const prev = sets[sets.length-1] || {weightKg:0, reps:8};
  sets.push({weightKg:prev.weightKg, reps:prev.reps, effort:null, isWarmup:false, done:false});
  render();
}
function addExercise(){
  const names = S.exercises.map((e,i)=>(i+1)+". "+e.name).join("\n");
  const pick = prompt("Type the number of the exercise to add:\n\n"+names);
  const idx = Number(pick)-1;
  if(!S.exercises[idx]) return;
  const exId = S.exercises[idx].id;
  const last = lastEntryFor(exId, null);
  const prev = last ? last.entry.sets[0] : null;
  S.draft.entries.push({exerciseId:exId, sets:[
    {weightKg:prev?prev.weightKg:0, reps:prev?prev.reps:8, effort:null, isWarmup:false, done:false},
    {weightKg:prev?prev.weightKg:0, reps:prev?prev.reps:8, effort:null, isWarmup:false, done:false},
    {weightKg:prev?prev.weightKg:0, reps:prev?prev.reps:8, effort:null, isWarmup:false, done:false}]});
  render();
}
function discardSession(){
  if(confirm("Discard this session? Nothing will be saved.")){
    S.draft=null; go("today");
  }
}

/* Finish: keep only ✓-confirmed sets; drop empty exercises; save. */
function finishSession(){
  const d = S.draft;
  const entries = d.entries
    .map(en=>({exerciseId:en.exerciseId,
      sets:en.sets.filter(s=>s.done).map(s=>({weightKg:s.weightKg, reps:s.reps,
        effort:s.effort, isWarmup:s.isWarmup}))}))
    .filter(en=>en.sets.length);
  if(!entries.length){
    alert("No sets are ticked ✓ yet. Tick the sets you completed, or discard the session.");
    return;
  }
  const skipped = d.entries.reduce((n,en)=>n+en.sets.filter(s=>!s.done).length,0);
  if(skipped && !confirm(skipped+" unticked set(s) will be dropped. Finish anyway?")) return;
  S.sessions.push({id:d.id, date:d.date, templateId:d.templateId, name:d.name,
    notes:d.notes, entries});
  S.draft = null;
  go("today");
}

/* ---------- 6. BACKUP: export / import / reset ---------- */

function exportData(){
  const blob = new Blob([JSON.stringify(S, null, 2)], {type:"application/json"});
  const a = document.createElement("a");
  a.href = URL.createObjectURL(blob);
  a.download = "atlas-export-"+todayISO()+".json";
  document.body.appendChild(a); a.click(); a.remove();
}
function importData(file){
  if(!file) return;
  const r = new FileReader();
  r.onload = () => {
    try{
      const data = JSON.parse(r.result);
      if(!data.sessions || !data.exercises) throw new Error("not an Atlas file");
      if(confirm("Replace ALL current data with this backup?")){
        S = data; save(); go("today");
      }
    }catch(e){ alert("That file couldn't be read as an Atlas backup."); }
  };
  r.readAsText(file);
}
function resetAll(){
  if(confirm("Erase ALL Atlas data on this phone? Export first if unsure.")
     && confirm("Really erase everything? This cannot be undone.")){
    S = seed(); save(); go("today");
  }
}

/* ---------- 7. BOOT ---------- */
if("serviceWorker" in navigator && (location.protocol==="https:" || location.hostname==="localhost")){
  navigator.serviceWorker.register("sw.js").catch(()=>{});
}
render();
</script>
