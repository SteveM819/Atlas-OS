<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1, viewport-fit=cover, user-scalable=no">
<title>RepCheck</title>

<!-- ===== iPhone "installed app" behaviour ===== -->
<meta name="apple-mobile-web-app-capable" content="yes">
<meta name="apple-mobile-web-app-status-bar-style" content="black-translucent">
<meta name="apple-mobile-web-app-title" content="RepCheck">
<meta name="theme-color" content="#0C0F14">
<link rel="apple-touch-icon" href="icon.png">

<style>
/* =====================================================================
   REPCHECK — v0.3 "The Dashboard"  (formerly Atlas OS)
   Session identity is now colour-coded everywhere:
   gym = steel→violet gradient · cardio = teal.
   Facts are deterministic arithmetic — the analyst's first words.
   ===================================================================== */
:root{
  --bg:      #0C0F14;
  --surface: #141A22;
  --surface2:#1D2530;
  --line:    #29323F;
  --text:    #EAF0F6;
  --muted:   #8A97A6;
  --act:     #7FB2E5;
  --grad:    linear-gradient(135deg,#6EA8E8 0%,#8F7BFF 100%);
  --gym:     #8F7BFF;
  --cardio:  #4FC7D4;
  --up:      #6FD99B;
  --down:    #E08A6E;
  --warn:    #E0B95A;
  --flat:    #8A97A6;
  --mono: ui-monospace, "SF Mono", SFMono-Regular, Menlo, monospace;
  --sans: -apple-system, BlinkMacSystemFont, "Segoe UI", Roboto, sans-serif;
  --r: 18px;
}
*{box-sizing:border-box; -webkit-tap-highlight-color:transparent;}
html,body{margin:0; padding:0; background:var(--bg); color:var(--text);
  font-family:var(--sans); font-size:16px; overscroll-behavior-y:none;}
body{padding-bottom:calc(84px + env(safe-area-inset-bottom));
  background-image:radial-gradient(120% 50% at 50% -10%, #16202e 0%, var(--bg) 60%);}

header{padding:calc(16px + env(safe-area-inset-top)) 18px 12px;
  display:flex; align-items:baseline; justify-content:space-between;}
.wordmark{font-weight:800; letter-spacing:.14em; font-size:15px;}
.wordmark span{background:var(--grad); -webkit-background-clip:text;
  background-clip:text; color:transparent;}
.headdate{font-family:var(--mono); font-size:12px; color:var(--muted);}

main{padding:0 14px;}
.card{background:var(--surface); border:1px solid var(--line);
  border-radius:var(--r); padding:16px; margin-bottom:12px;
  box-shadow:0 10px 24px rgba(0,0,0,.28), inset 0 1px 0 rgba(255,255,255,.03);}
.card h2{margin:0 0 2px; font-size:12px; font-weight:700; color:var(--muted);
  text-transform:uppercase; letter-spacing:.1em;}
.big{font-size:27px; font-weight:800; margin:3px 0 0; letter-spacing:-.02em;}
.sub{color:var(--muted); font-size:13px; margin-top:3px;}
.row{display:flex; align-items:center; gap:10px;}
.spread{display:flex; align-items:center; justify-content:space-between;}

button{font-family:var(--sans); border:none; cursor:pointer;
  transition:transform .12s ease, filter .12s ease;}
button:active{transform:scale(.96);}
.btn{width:100%; padding:15px; border-radius:14px; font-size:16px;
  font-weight:700; background:var(--grad); color:#0A1220;
  box-shadow:0 8px 20px rgba(110,150,235,.28);}
.btn.secondary{background:var(--surface2); color:var(--text);
  border:1px solid var(--line); box-shadow:none;}
.btn.danger{background:transparent; color:var(--down);
  border:1px solid var(--down); box-shadow:none;}
.btn.teal{background:linear-gradient(135deg,#4FC7D4,#5AD8A6); color:#062126;
  box-shadow:0 8px 20px rgba(79,199,212,.25);}
.chipbtn{background:var(--surface2); border:1px solid var(--line);
  color:var(--act); font-size:12px; font-weight:700; padding:7px 11px;
  border-radius:999px;}
.chipbtn.sel{background:var(--grad); color:#0A1220; border-color:transparent;}
.chipbtn.tealsel{background:linear-gradient(135deg,#4FC7D4,#5AD8A6);
  color:#062126; border-color:transparent;}

.delta{font-family:var(--mono); font-size:12.5px; font-weight:600;
  padding:4px 9px; border-radius:999px; white-space:nowrap;
  background:var(--surface2); border:1px solid var(--line);}
.delta.up  {color:var(--up);   background:rgba(111,217,155,.10); border-color:rgba(111,217,155,.35);}
.delta.down{color:var(--down); background:rgba(224,138,110,.10); border-color:rgba(224,138,110,.35);}
.delta.warn{color:var(--warn); background:rgba(224,185,90,.10);  border-color:rgba(224,185,90,.35);}
.delta.teal{color:var(--cardio); background:rgba(79,199,212,.10); border-color:rgba(79,199,212,.35);}
.delta.flat{color:var(--flat);}

/* kind badges: colour-coded session identity */
.badge{font-size:10px; font-weight:800; letter-spacing:.1em; padding:3px 8px;
  border-radius:999px; text-transform:uppercase;}
.badge.gym{background:rgba(143,123,255,.15); color:var(--gym);
  border:1px solid rgba(143,123,255,.4);}
.badge.cardio{background:rgba(79,199,212,.14); color:var(--cardio);
  border:1px solid rgba(79,199,212,.4);}

.metrics{display:grid; grid-template-columns:1fr 1fr; gap:8px;}
.metric{background:var(--surface2); border:1px solid var(--line);
  border-radius:12px; padding:9px 11px;}
.metric label{display:block; font-size:10.5px; color:var(--muted);
  text-transform:uppercase; letter-spacing:.07em;}
.metric input{width:100%; background:transparent; border:none; color:var(--text);
  font-family:var(--mono); font-size:18px; font-weight:600; padding:2px 0;
  outline:none;}
.metric input::placeholder{color:#3a4655;}

.bar{height:9px; background:var(--surface2); border-radius:6px;
  overflow:hidden; margin-top:9px;}
.bar > div{height:100%; background:var(--grad); border-radius:6px;
  transition:width .35s cubic-bezier(.2,.8,.2,1);}
.bar.teal > div{background:linear-gradient(90deg,#4FC7D4,#5AD8A6);}

/* facts */
.factrow{display:flex; justify-content:space-between; align-items:center;
  padding:9px 0; border-bottom:1px solid var(--line); font-size:14px;}
.factrow:last-child{border-bottom:none;}
.factval{font-family:var(--mono); font-weight:700;}
.sumgrid{display:grid; grid-template-columns:1fr 1fr; gap:10px; margin-top:10px;}
.sumbox{background:var(--surface2); border:1px solid var(--line);
  border-radius:12px; padding:12px;}
.sumbox .v{font-family:var(--mono); font-size:22px; font-weight:800;}
.sumbox .k{font-size:11px; color:var(--muted); text-transform:uppercase;
  letter-spacing:.07em; margin-top:2px;}

/* ---------- session ---------- */
.sessionhead{position:sticky; top:0; z-index:5; margin:0 -14px 10px;
  padding:10px 16px; background:rgba(12,15,20,.88); backdrop-filter:blur(14px);
  border-bottom:1px solid var(--line); display:flex; align-items:center;
  justify-content:space-between;}
.sessionhead .t{font-size:18px; font-weight:800;}
.sessionhead .m{font-family:var(--mono); font-size:12px; color:var(--muted);}
.hint{font-size:11.5px; color:var(--muted); margin:0 4px 12px; line-height:1.5;}
.ssflag{display:inline-block; font-size:10px; font-weight:800;
  letter-spacing:.12em; color:#0A1220; background:var(--grad);
  padding:3px 8px; border-radius:999px; margin-bottom:8px;}
.exblock + .exblock{margin-top:14px; padding-top:14px;
  border-top:1px dashed var(--line);}
.exname{font-size:16px; font-weight:700;}
.lastline{font-family:var(--mono); font-size:12px; color:var(--muted);
  margin-top:2px;}
.noteline{font-size:12px; color:var(--warn); margin-top:3px;}
.setrow{display:flex; align-items:center; gap:6px; margin-top:10px;
  opacity:.5; transition:opacity .15s;}
.setrow.done{opacity:1;}
.setnum{font-family:var(--mono); font-size:12px; color:var(--muted);
  width:20px; text-align:center; padding:8px 0;}
.setnum.warm{color:var(--warn); font-weight:800;}
.step{width:34px; height:42px; border-radius:11px; background:var(--surface2);
  border:1px solid var(--line); color:var(--act); font-size:19px;
  font-weight:700; flex:none;}
.val{font-family:var(--mono); font-size:17px; font-weight:700;
  min-width:54px; text-align:center; background:transparent; border:none;
  color:var(--text); padding:0;}
.val.reps{min-width:32px;}
.unit{font-size:11px; color:var(--muted); margin-left:-4px;}
.check{width:46px; height:42px; border-radius:11px; flex:none;
  background:var(--surface2); border:1px solid var(--line);
  color:var(--muted); font-size:16px; font-weight:700;}
.check .tclk{font-size:9px; opacity:.75; vertical-align:top;}
.setrow.done .check{background:var(--up); border-color:var(--up);
  color:#0A1220; box-shadow:0 4px 14px rgba(111,217,155,.35);}
.addset{margin-top:10px; background:transparent; color:var(--act);
  font-size:14px; font-weight:600; padding:6px 0;}

/* ---------- rest timer pill ---------- */
#rest{position:fixed; left:14px; right:14px;
  bottom:calc(84px + env(safe-area-inset-bottom)); z-index:20;
  background:var(--surface2); border:1px solid var(--line);
  border-radius:999px; padding:8px 10px 8px 18px;
  display:none; align-items:center; justify-content:space-between;
  box-shadow:0 14px 34px rgba(0,0,0,.5);}
#rest.on{display:flex;}
#rest .time{font-family:var(--mono); font-size:20px; font-weight:800;}
#rest.warn .time{color:var(--warn); animation:pulse 1s infinite;}
#rest.zero{border-color:var(--up);}
#rest.zero .time{color:var(--up);}
@keyframes pulse{50%{opacity:.35;}}
#rest .rb{background:var(--surface); border:1px solid var(--line);
  color:var(--act); font-family:var(--mono); font-size:13px; font-weight:700;
  padding:9px 12px; border-radius:999px;}
#rest .rb.again{background:var(--up); color:#0A1220; border-color:var(--up);}

/* ---------- modal sheet ---------- */
#modal{position:fixed; inset:0; z-index:50; display:none;
  background:rgba(5,8,12,.6); backdrop-filter:blur(4px);}
#modal.on{display:block;}
.sheet{position:absolute; left:0; right:0; bottom:0; max-height:78vh;
  overflow-y:auto; background:var(--surface); border-radius:22px 22px 0 0;
  border:1px solid var(--line); border-bottom:none;
  padding:18px 16px calc(20px + env(safe-area-inset-bottom));}
.sheet h3{margin:0 0 12px; font-size:17px; font-weight:800;}
.pickitem{display:flex; justify-content:space-between; align-items:center;
  padding:13px 4px; border-bottom:1px solid var(--line); font-size:15px;}
.pickitem:last-child{border-bottom:none;}
.pickcat{font-size:11px; color:var(--muted); text-transform:uppercase;
  letter-spacing:.08em; margin:14px 4px 2px;}
.searchbox,.textbox,select.textbox{width:100%; background:var(--surface2);
  border:1px solid var(--line); border-radius:12px; color:var(--text);
  font-size:16px; padding:12px; outline:none; font-family:var(--sans);}
.reasons{display:grid; grid-template-columns:1fr 1fr; gap:10px; margin-top:6px;}
.reasons .btn.secondary{padding:16px;}

/* ---------- history ---------- */
.hitem{border-bottom:1px solid var(--line); padding:13px 2px 13px 12px;
  border-left:3px solid transparent; margin-left:-12px;}
.hitem.gym{border-left-color:var(--gym);}
.hitem.cardio{border-left-color:var(--cardio);}
.hitem:last-child{border-bottom:none;}
.hdet{margin-top:8px; font-family:var(--mono); font-size:13px;
  color:var(--muted); line-height:1.7;}

nav{position:fixed; bottom:0; left:0; right:0; display:flex; gap:4px;
  background:rgba(12,15,20,.9); backdrop-filter:blur(16px);
  border-top:1px solid var(--line);
  padding:10px 10px calc(10px + env(safe-area-inset-bottom));}
nav button{flex:1; background:none; color:var(--muted); font-size:12px;
  font-weight:700; letter-spacing:.04em; padding:9px 0; border-radius:12px;}
nav button.active{color:var(--text); background:var(--surface2);
  border:1px solid var(--line);}
nav .ic{display:block; font-size:19px; margin-bottom:2px;}

.empty{color:var(--muted); text-align:center; padding:28px 10px;
  font-size:14px; line-height:1.6;}
h1.screen{font-size:23px; font-weight:800; margin:6px 4px 14px;
  letter-spacing:-.02em;}
.note{font-size:12px; color:var(--muted); line-height:1.6; margin-top:10px;}
.togglerow{display:flex; justify-content:space-between; align-items:center;
  margin-top:10px;}
.switch{width:52px; height:30px; border-radius:999px; background:var(--surface2);
  border:1px solid var(--line); position:relative;}
.switch.on{background:var(--grad); border-color:transparent;}
.switch::after{content:""; position:absolute; top:3px; left:3px; width:22px;
  height:22px; border-radius:50%; background:#fff; transition:left .15s;}
.switch.on::after{left:25px;}
.rate{display:flex; gap:8px; margin-top:10px;}
.rate button{flex:1; padding:13px 0; border-radius:12px; font-size:16px;
  font-weight:800; background:var(--surface2); border:1px solid var(--line);
  color:var(--muted);}
.rate button.sel{background:var(--grad); color:#0A1220; border-color:transparent;}
@media (prefers-reduced-motion: reduce){ *{transition:none !important; animation:none !important;} }
</style>
</head>
<body>

<header>
  <div class="wordmark">REP<span>CHECK</span></div>
  <div class="headdate" id="headdate"></div>
</header>

<main id="main"></main>

<div id="rest">
  <span class="time" id="resttime">1:30</span>
  <span class="row" style="gap:6px" id="restbtns"></span>
</div>

<div id="modal" onclick="if(event.target===this) closeModal()">
  <div class="sheet" id="sheetc"></div>
</div>

<nav>
  <button id="nav-today" onclick="go('today')"><span class="ic">◉</span>Today</button>
  <button id="nav-history" onclick="go('history')"><span class="ic">≡</span>History</button>
  <button id="nav-settings" onclick="go('settings')"><span class="ic">⚙︎</span>Settings</button>
</nav>

<script>
/* =====================================================================
   REPCHECK v0.3 — "The Dashboard"  (renamed from Atlas OS)
   New: cardio sessions (run/row/stair/other) · colour-coded history ·
   deterministic facts engine · dashboard · training blocks ·
   post-session check-in · bodyweight sparkline.
   All v0.2.2 features retained.
   Sections: STATE → MIGRATION → HELPERS → FACTS → TIMERS → MODALS →
   SCREENS → ACTIONS → BACKUP → BOOT
   ===================================================================== */

/* IMPORTANT: the storage key keeps its historical name so every byte of
   existing data survives the rename. Renaming the key = losing the data. */
const STORE_KEY = "atlasos_v1";
const VERSION   = "0.4.0";
const CATS = ["chest","back","shoulders","arms","legs","abs","cardio","other"];
const SKIP_REASONS = ["busy","pain","time","fatigue","other"];
const CARDIO_TYPES = ["run","row","stair","other"];
const BLOCK_TYPES = ["cut","bulk","maintain"];

/* ---------- 1. STATE ---------- */

let S = migrate(load());

function load(){
  try{
    const raw = localStorage.getItem(STORE_KEY);
    if(raw) return JSON.parse(raw);
  }catch(e){ console.error("load failed", e); }
  return seed();
}
function save(){ localStorage.setItem(STORE_KEY, JSON.stringify(S)); }

function seed(){
  const ex = (id,name,group,compound)=>({id,name,muscleGroup:group,isCompound:!!compound,note:null});
  const exercises = [
    ex("chest-press","Chest Press Machine","chest",1),
    ex("lat-pulldown","Neutral-Grip Lat Pulldown","back",1),
    ex("db-lateral","DB Lateral Raise","shoulders"),
    ex("pec-deck","Pec Deck","chest"),
    ex("cable-row","Seated Cable Row","back",1),
    ex("tri-ext","Tricep Extension","arms"),
    ex("db-curl","DB Bicep Curl","arms"),
    ex("squat","Barbell Squat","legs",1),
    ex("hack-squat","Hack Squat","legs",1),
    ex("leg-press","Leg Press","legs",1),
    ex("leg-ext","Leg Extension","legs"),
    ex("ham-curl","Lying Hamstring Curl","legs"),
    ex("lunges","Lunges","legs",1),
    ex("cable-crunch","Cable Crunch","abs"),
    ex("ab-machine","Ab Machine","abs"),
    ex("incline-db","Incline DB Press","chest",1),
    ex("db-shoulder","DB Shoulder Press","shoulders",1),
    ex("dips","Dips","chest",1),
    ex("pull-ups","Pull-Ups","back",1),
    ex("incline-curl","Incline DB Curl","arms"),
    ex("cgbp","Close-Grip Bench Press","arms",1),
    ex("oh-tri","Overhead Tricep Extension","arms"),
    ex("cable-cross","Cable Cross-Body Pull","back"),
    ex("cable-lateral","Cable Lateral Raise","shoulders"),
  ];
  const slot = (exerciseId,targetSets,ss)=>({exerciseId,targetSets,targetRepRange:null,ss:ss||null});
  const templates = [
    {id:"upper", name:"Upper", slots:[
      slot("chest-press",3), slot("lat-pulldown",3), slot("db-lateral",4),
      slot("pec-deck",3), slot("cable-row",3),
      slot("tri-ext",3,"a"), slot("db-curl",3,"a")]},
    {id:"legs", name:"Legs", slots:[
      slot("hack-squat",3), slot("leg-press",3), slot("leg-ext",3),
      slot("ham-curl",3), slot("lunges",3), slot("cable-crunch",3), slot("ab-machine",3)]},
    {id:"push", name:"Push", slots:[
      slot("incline-db",3), slot("db-shoulder",3), slot("pec-deck",3),
      slot("tri-ext",3), slot("db-lateral",4), slot("dips",3)]},
    {id:"pull", name:"Pull (arms/abs)", slots:[
      slot("pull-ups",3), slot("cable-row",3), slot("incline-curl",3),
      slot("cgbp",3), slot("cable-cross",3), slot("cable-lateral",3),
      slot("cable-crunch",3), slot("ab-machine",3)]},
  ];
  return {
    settings:{units:"kg", weeklyRunTargetKm:15, restDefaultSec:90,
      keepAwake:true, lastExportAt:null, appVersion:VERSION},
    exercises, templates, sessions:[], dailyMetrics:[], cardio:[], blocks:[], draft:null
  };
}

/* ---------- 2. MIGRATION: upgrade older data in place, never lose it ---------- */
function migrate(s){
  if(!s.settings) return s;
  if(!s.settings.restDefaultSec) s.settings.restDefaultSec = 90;
  if(s.settings.keepAwake===undefined) s.settings.keepAwake = true;
  if(s.settings.lastExportAt===undefined) s.settings.lastExportAt = null;
  const upper = s.templates && s.templates.find(t=>t.id==="upper");
  if(upper) upper.slots.forEach(sl=>{
    if(sl.ss===undefined) sl.ss = null;
    if(sl.exerciseId==="tri-ext" || sl.exerciseId==="db-curl") sl.ss = "a";
  });
  (s.templates||[]).forEach(t=>t.slots.forEach(sl=>{ if(sl.ss===undefined) sl.ss=null; }));
  (s.exercises||[]).forEach(e=>{
    if(e.note===undefined) e.note = null;
    if(e.muscleGroup==="triceps"||e.muscleGroup==="biceps") e.muscleGroup="arms";
  });
  (s.sessions||[]).forEach(x=>{
    if(x.skips===undefined) x.skips = [];
    if(x.rating===undefined) x.rating = null;
    if(x.flag===undefined) x.flag = null;
  });
  if(s.draft && s.draft.skips===undefined) s.draft.skips = [];
  /* v0.3: cardio sessions + training blocks. Old run entries in
     dailyMetrics.runKm are converted to cardio sessions exactly once
     (idempotent: the runKm field is nulled after conversion). */
  if(!s.cardio) s.cardio = [];
  if(!s.blocks) s.blocks = [];
  (s.dailyMetrics||[]).forEach(m=>{
    if(m.runKm){
      s.cardio.push({id:"c"+m.date, date:m.date, type:"run",
        km:Number(m.runKm), minutes:null});
      m.runKm = null;
    }
  });
  s.settings.appVersion = VERSION;
  return s;
}

/* ---------- 3. HELPERS ---------- */

const $  = sel => document.querySelector(sel);
const exById = id => S.exercises.find(e=>e.id===id);
const todayISO = () => { const d=new Date();
  return d.getFullYear()+"-"+String(d.getMonth()+1).padStart(2,"0")+"-"+String(d.getDate()).padStart(2,"0"); };
const fmtW = w => w===0 ? "BW" : (Math.round(w*10)/10)+"";
const esc  = s => String(s).replace(/[&<>"]/g, c=>({"&":"&amp;","<":"&lt;",">":"&gt;",'"':"&quot;"}[c]));
const mmss = t => Math.floor(t/60)+":"+String(t%60).padStart(2,"0");
const daysBetween = (a,b) => Math.round((new Date(b+"T12:00:00") - new Date(a+"T12:00:00"))/86400000);
const isoShift = (dateStr, days) => { const d = new Date(dateStr+"T12:00:00");
  d.setDate(d.getDate()+days);
  return d.getFullYear()+"-"+String(d.getMonth()+1).padStart(2,"0")+"-"+String(d.getDate()).padStart(2,"0"); };

const WEEK = {1:"upper", 2:"legs", 3:"RUN", 4:"push", 5:"pull", 6:"LONGRUN", 0:"REST"};

function metricsFor(date){
  let m = S.dailyMetrics.find(x=>x.date===date);
  if(!m){ m={date, bodyweightKg:null, sleepHours:null, runKm:null, notes:null};
    S.dailyMetrics.push(m); }
  return m;
}

/* Monday–Sunday range containing a date. */
function weekRange(dateStr){
  const d = new Date(dateStr+"T12:00:00");
  const day = (d.getDay()+6)%7;
  const from = isoShift(dateStr, -day);
  return [from, isoShift(from, 6)];
}
function weekCardioKm(dateStr){
  const [from,to] = weekRange(dateStr);
  const total = S.cardio.filter(c=>c.date>=from && c.date<=to && c.km)
    .reduce((n,c)=>n+Number(c.km),0);
  return Math.round(total*10)/10;
}

/* Derived cardio facts: pace (min/km) and average speed (km/h),
   computed only when both distance and time exist. */
function cardioStats(c){
  if(!c.km || !c.minutes) return "";
  const paceSec = Math.round(c.minutes*60 / c.km);
  const kmh = Math.round(c.km / (c.minutes/60) * 10) / 10;
  return mmss(paceSec) + " /km · " + kmh + " km/h";
}

function backupAgeDays(){
  if(!S.settings.lastExportAt) return null;
  return daysBetween(S.settings.lastExportAt, todayISO());
}
function backupOverdue(){
  const a = backupAgeDays();
  return a===null || a>7;
}

/* Active training block, if any: started, not ended, within its weeks. */
function activeBlock(){
  const t = todayISO();
  for(const b of [...S.blocks].reverse()){
    if(b.endedAt) continue;
    if(b.startDate > t) continue;
    const week = Math.floor(daysBetween(b.startDate, t)/7) + 1;
    if(week <= b.weeks) return {...b, week};
  }
  return null;
}

/* ---------- 4. FACTS — deterministic arithmetic, no AI ---------- */

function topSet(sets){
  const working = sets.filter(s=>!s.isWarmup);
  if(!working.length) return null;
  return working.reduce((a,b)=> (b.weightKg>a.weightKg ||
    (b.weightKg===a.weightKg && b.reps>a.reps)) ? b : a);
}

function lastEntryFor(exId, beforeSessionId){
  for(const sess of [...S.sessions].sort((a,b)=>b.date.localeCompare(a.date) || b.id.localeCompare(a.id))){
    if(sess.id===beforeSessionId) continue;
    const entry = sess.entries.find(en=>en.exerciseId===exId && en.sets.length);
    if(entry) return {session:sess, entry};
  }
  return null;
}

/* deltaFor is defined below (v0.4: verdict by e1RM). */

function tonnage(entries){
  return Math.round(entries.reduce((t,en)=>
    t + en.sets.filter(s=>!s.isWarmup).reduce((x,s)=>x + s.weightKg*s.reps, 0), 0));
}

/* Estimated 1-rep max (Epley): converts any set to one comparable number,
   so 60×8 and 62.5×6 can be judged fairly. For bodyweight exercises
   (weight 0) we score by reps instead — only ever compared within the
   same exercise, so the scales never mix in practice. */
function e1(set){
  if(set.weightKg === 0) return set.reps;
  return Math.round(set.weightKg * (1 + set.reps/30) * 10) / 10;
}
function betterThan(a, b){ return e1(a) > e1(b); }

/* Delta ticker v2: the VERDICT (up/down/flat) comes from e1RM, so a
   heavier-but-far-fewer-reps set no longer counts as progress. The LABEL
   stays intuitive (kg or reps) whenever it agrees with the verdict, and
   falls back to the e1RM number when they disagree. */
function deltaFor(exId, sets, excludeSessionId){
  const now = topSet(sets);
  const last = lastEntryFor(exId, excludeSessionId);
  if(!now) return null;
  if(!last) return {cls:"flat", label:"first log"};
  const prev = topSet(last.entry.sets);
  if(!prev) return {cls:"flat", label:"first log"};

  const de1 = Math.round((e1(now) - e1(prev))*10)/10;
  const dw  = Math.round((now.weightKg - prev.weightKg)*10)/10;
  const dr  = now.reps - prev.reps;
  if(de1 === 0) return {cls:"flat", label:"― same"};
  const cls = de1 > 0 ? "up" : "down";
  const arrow = de1 > 0 ? "▲" : "▼";

  if(now.weightKg===0 && prev.weightKg===0)          /* bodyweight lift */
    return {cls, label:arrow+" "+(dr>0?"+":"")+dr+" rep"+(Math.abs(dr)>1?"s":"")};
  if(dw !== 0 && Math.sign(dw) === Math.sign(de1))
    return {cls, label:arrow+" "+(dw>0?"+":"")+dw+" kg"};
  if(dw === 0 && dr !== 0)
    return {cls, label:arrow+" "+(dr>0?"+":"")+dr+" rep"+(Math.abs(dr)>1?"s":"")};
  /* weight and e1RM point different ways — say the honest number */
  return {cls, label:arrow+" e1RM "+(de1>0?"+":"")+de1};
}

/* All-time records for one exercise: best single-set weight, best e1RM,
   best session volume — with the dates they happened. */
function recordsFor(exId){
  let bestW=null, bestE=null, bestV=null;
  for(const sess of S.sessions){
    for(const en of sess.entries){
      if(en.exerciseId!==exId) continue;
      let vol = 0;
      for(const s of en.sets){
        if(s.isWarmup) continue;
        vol += s.weightKg*s.reps;
        if(!bestW || s.weightKg>bestW.v || (s.weightKg===bestW.v && s.reps>bestW.reps))
          bestW = {v:s.weightKg, reps:s.reps, date:sess.date};
        const ev = e1(s);
        if(!bestE || ev>bestE.v) bestE = {v:ev, date:sess.date};
      }
      if(vol>0 && (!bestV || vol>bestV.v)) bestV = {v:Math.round(vol), date:sess.date};
    }
  }
  return {bestW, bestE, bestV};
}

/* Per-exercise progression: chronological top-set e1RM per session. */
function exSeries(exId){
  const pts = [];
  for(const sess of [...S.sessions].sort((a,b)=>a.date.localeCompare(b.date)||a.id.localeCompare(b.id))){
    const en = sess.entries.find(x=>x.exerciseId===exId);
    if(!en) continue;
    const ts = topSet(en.sets);
    if(ts) pts.push({date:sess.date, v:e1(ts), top:ts});
  }
  return pts;
}
function exChart(exId){
  const pts = exSeries(exId).slice(-20);
  if(pts.length < 2) return `<div class="note">The chart appears after two logged sessions.</div>`;
  const W=300, H=90, P=8;
  const vals = pts.map(p=>p.v);
  const min = Math.min(...vals), max = Math.max(...vals);
  const span = (max-min) || 1;
  const xy = pts.map((p,i)=>[
    P + i*(W-2*P)/(pts.length-1),
    H-P - (p.v-min)*(H-2*P)/span ]);
  const line = xy.map(p=>p[0].toFixed(1)+","+p[1].toFixed(1)).join(" ");
  const lastP = xy[xy.length-1];
  return `<svg width="100%" viewBox="0 0 ${W} ${H}" style="margin-top:8px">
    <polyline points="${line}" fill="none" stroke="#8F7BFF" stroke-width="2"
      stroke-linejoin="round" stroke-linecap="round"/>
    <circle cx="${lastP[0].toFixed(1)}" cy="${lastP[1].toFixed(1)}" r="3.5" fill="#6FD99B"/>
    <text x="${P}" y="12" fill="#8A97A6" font-size="10" font-family="monospace">${max}</text>
    <text x="${P}" y="${H-2}" fill="#8A97A6" font-size="10" font-family="monospace">${min}</text>
  </svg>
  <div class="note" style="margin-top:2px">Top-set e1RM, last ${pts.length} sessions
    (bodyweight lifts chart reps).</div>`;
}

/* Working sets in a date range (whole app, or per muscle group). */
function setsInRange(from, to){
  const byGroup = {};
  let total = 0;
  for(const sess of S.sessions){
    if(sess.date<from || sess.date>to) continue;
    for(const en of sess.entries){
      const g = exById(en.exerciseId)?.muscleGroup || "other";
      const n = en.sets.filter(s=>!s.isWarmup).length;
      byGroup[g] = (byGroup[g]||0) + n;
      total += n;
    }
  }
  return {total, byGroup};
}

/* Is a lift stalled? Walk its top sets chronologically; count sessions
   since the last genuine improvement (weight up, or reps up at equal
   weight). 3+ sessions without improvement = stalled.                  */
/* betterThan is defined above (v0.4: judged by e1RM). */
function stalledLifts(){
  const byEx = {};
  for(const sess of [...S.sessions].sort((a,b)=>a.date.localeCompare(b.date)||a.id.localeCompare(b.id))){
    for(const en of sess.entries){
      const ts = topSet(en.sets);
      if(!ts) continue;
      (byEx[en.exerciseId] = byEx[en.exerciseId]||[]).push(ts);
    }
  }
  const out = [];
  for(const [exId, tops] of Object.entries(byEx)){
    if(tops.length < 4) continue;            /* need history to judge */
    let best = tops[0], since = 0;
    for(let i=1; i<tops.length; i++){
      if(betterThan(tops[i], best)){ best = tops[i]; since = 0; }
      else since++;
    }
    if(since >= 3){
      const ex = exById(exId);
      out.push({exId, name: ex?.name ?? exId, sessions: since,
        top: fmtW(best.weightKg)+"×"+best.reps});
    }
  }
  return out.sort((a,b)=>b.sessions-a.sessions).slice(0,4);
}

/* Bodyweight: average over the 7 days ending at `endDate` (inclusive). */
function bw7(endDate){
  const from = isoShift(endDate, -6);
  const vals = S.dailyMetrics
    .filter(m=>m.date>=from && m.date<=endDate && m.bodyweightKg!==null && m.bodyweightKg!==undefined)
    .map(m=>Number(m.bodyweightKg));
  if(!vals.length) return null;
  return Math.round(vals.reduce((a,b)=>a+b,0)/vals.length*10)/10;
}
function bwTrend(){
  const now = bw7(todayISO());
  const prev = bw7(isoShift(todayISO(),-7));
  if(now===null) return null;
  if(prev===null) return {avg:now, delta:null};
  return {avg:now, delta:Math.round((now-prev)*10)/10};
}

/* Average gym session duration over the last 28 days. */
function avgDuration(){
  const from = isoShift(todayISO(),-28);
  const ds = S.sessions.filter(s=>s.date>=from && s.durationMin).map(s=>s.durationMin);
  if(!ds.length) return null;
  return Math.round(ds.reduce((a,b)=>a+b,0)/ds.length);
}

/* Bodyweight sparkline: inline SVG of the last 30 days of weigh-ins. */
function sparkline(){
  const from = isoShift(todayISO(),-29);
  const pts = S.dailyMetrics
    .filter(m=>m.date>=from && m.bodyweightKg!==null && m.bodyweightKg!==undefined)
    .sort((a,b)=>a.date.localeCompare(b.date))
    .map(m=>Number(m.bodyweightKg));
  if(pts.length < 2) return "";
  const W=280, H=44, P=4;
  const min = Math.min(...pts), max = Math.max(...pts);
  const span = (max-min) || 1;
  const xy = pts.map((v,i)=>[
    P + i*(W-2*P)/(pts.length-1),
    H-P - (v-min)*(H-2*P)/span ]);
  const line = xy.map(p=>p[0].toFixed(1)+","+p[1].toFixed(1)).join(" ");
  const last = xy[xy.length-1];
  return `<svg width="100%" viewBox="0 0 ${W} ${H}" style="margin-top:8px">
    <polyline points="${line}" fill="none" stroke="#6EA8E8" stroke-width="2"
      stroke-linejoin="round" stroke-linecap="round"/>
    <circle cx="${last[0].toFixed(1)}" cy="${last[1].toFixed(1)}" r="3.5" fill="#6FD99B"/>
  </svg>`;
}

/* ---------- 5. TIMERS ---------- */

let clockIv = null;
function tickClock(){
  const el = $("#elapsed");
  if(el && S.draft && S.draft.startedAt)
    el.textContent = mmss(Math.floor((Date.now()-S.draft.startedAt)/1000));
}
function manageClock(){
  clearInterval(clockIv);
  if(view==="session" && S.draft) clockIv = setInterval(tickClock, 1000);
}

let rest = {endsAt:0, iv:null, active:false};
function restLeft(){ return Math.max(0, Math.ceil((rest.endsAt - Date.now())/1000)); }
function restStart(sec){
  clearInterval(rest.iv);
  rest.endsAt = Date.now() + sec*1000;
  rest.active = true;
  rest.iv = setInterval(restTick, 500);
  restTick();
}
function restTick(){
  if(!rest.active) return;
  const left = restLeft();
  const el = $("#rest");
  el.classList.add("on");
  el.classList.toggle("warn", left>0 && left<=20);
  el.classList.toggle("zero", left===0);
  $("#resttime").textContent = mmss(left);
  $("#restbtns").innerHTML = left===0
    ? `<button class="rb again" onclick="restStart(S.settings.restDefaultSec)">↻ ${mmss(S.settings.restDefaultSec)}</button>
       <button class="rb" onclick="restStop()">✕</button>`
    : `<button class="rb" onclick="restAdj(-30)">−30s</button>
       <button class="rb" onclick="restAdj(30)">+30s</button>
       <button class="rb" onclick="restStop()">✕</button>`;
  if(left===0 && rest.iv){ clearInterval(rest.iv); rest.iv=null; beep(); }
}
function restAdj(d){
  rest.endsAt = Math.max(Date.now(), rest.endsAt + d*1000);
  if(!rest.iv && restLeft()>0) rest.iv = setInterval(restTick, 500);
  restTick();
}
function restStop(){
  clearInterval(rest.iv); rest.iv=null; rest.active=false;
  $("#rest").classList.remove("on","warn","zero");
}
function beep(){
  try{
    const ctx = new (window.AudioContext||window.webkitAudioContext)();
    const tone = (at)=>{ const o=ctx.createOscillator(), g=ctx.createGain();
      o.connect(g); g.connect(ctx.destination);
      o.frequency.value=880; g.gain.value=0.14;
      o.start(ctx.currentTime+at); o.stop(ctx.currentTime+at+0.45); };
    tone(0); tone(0.7);
  }catch(e){}
}

let wl = null;
async function manageWake(){
  try{
    if(view==="session" && S.settings.keepAwake && "wakeLock" in navigator){
      wl = await navigator.wakeLock.request("screen");
    } else if(wl){ await wl.release(); wl = null; }
  }catch(e){}
}
document.addEventListener("visibilitychange", ()=>{
  if(document.visibilityState==="visible"){ restTick(); tickClock(); manageWake(); }
});

/* ---------- 6. MODALS ---------- */

function openModal(html){ $("#sheetc").innerHTML = html; $("#modal").classList.add("on"); }
function closeModal(){ $("#modal").classList.remove("on"); }

let pickCb = null;
function pickExercise(cb, title){
  pickCb = cb;
  openModal(`<h3>${esc(title||"Choose exercise")}</h3>
    <input class="searchbox" placeholder="Search…" oninput="renderPickList(this.value)">
    <div id="picklist"></div>`);
  renderPickList("");
}
function renderPickList(q){
  q = q.toLowerCase();
  let h = `<div class="pickitem" style="color:var(--act); font-weight:700"
    onclick="createExerciseForm()">＋ Create new exercise</div>`;
  for(const cat of CATS){
    const items = S.exercises.filter(e=>e.muscleGroup===cat &&
      e.name.toLowerCase().includes(q));
    if(!items.length) continue;
    h += `<div class="pickcat">${cat}</div>`;
    for(const e of items)
      h += `<div class="pickitem" onclick="pickDone('${e.id}')">${esc(e.name)}</div>`;
  }
  $("#picklist").innerHTML = h;
}
function pickDone(id){ closeModal(); if(pickCb) pickCb(id); }
function createExerciseForm(){
  openModal(`<h3>New exercise</h3>
    <input class="textbox" id="newexname" placeholder="Name (e.g. DB Romanian Deadlift)">
    <div style="height:10px"></div>
    <select class="textbox" id="newexcat">
      ${CATS.map(c=>`<option value="${c}">${c}</option>`).join("")}
    </select>
    <div style="height:14px"></div>
    <button class="btn" onclick="createExerciseSave()">Add to library</button>`);
}
function createExerciseSave(){
  const name = $("#newexname").value.trim();
  if(!name){ alert("Give it a name first."); return; }
  const id = "x" + Date.now();
  S.exercises.push({id, name, muscleGroup:$("#newexcat").value, isCompound:false, note:null});
  save(); closeModal();
  if(pickCb) pickCb(id);
}

function pickReason(cb, title){
  openModal(`<h3>${esc(title)}</h3>
    <div class="reasons">${SKIP_REASONS.map(r=>
      `<button class="btn secondary" onclick="closeModal(); (${cb})('${r}')">${r}</button>`).join("")}
    </div>`);
}

function render(){

    {weekday:"short", day:"numeric", month:"short"});
  ["today","history","settings"].forEach(v=>
    $("#nav-"+v).classList.toggle("active", view===v ||
      (v==="today" && (view==="session"||view==="summary")) ||
      (v==="settings" && (view==="templates"||view==="tedit"))));

  if(view==="today")     m.innerHTML = TodayScreen();
  if(view==="session")   m.innerHTML = SessionScreen();

  if(view==="history")   m.innerHTML = HistoryScreen();
  if(view==="settings")  m.innerHTML = SettingsScreen();
  if(view==="exercise")  m.innerHTML = ExerciseScreen();
  if(view==="templates") m.innerHTML = TemplatesScreen();

/* ----- TODAY: the dashboard — "what do I need to know?" ----- */
function TodayScreen(){
  const plan = WEEK[new Date().getDay()];
  const met  = metricsFor(todayISO());
  const wk   = weekCardioKm(todayISO());
  const tgt  = S.settings.weeklyRunTargetKm;
  let h = "";

  /* -- today's plan / resume -- */
  if(S.draft){
    h += `<div class="card"><h2>In progress</h2>
      <div class="big">${esc(S.draft.name)}</div>
      <div style="margin-top:12px"><button class="btn" onclick="go('session')">Resume session</button></div></div>`;
  } else if(plan==="RUN" || plan==="LONGRUN"){
    h += `<div class="card"><h2>Today</h2>
      <div class="big">${plan==="LONGRUN"?"Long Run":"Run"}</div>
      <div class="sub">Log it in the cardio card below when you're done.</div></div>`;
  } else if(plan==="REST"){
    h += `<div class="card"><h2>Today</h2><div class="big">Rest</div>
      <div class="sub">Recovery is a training day too. Nothing to log but metrics.</div></div>`;
  } else {
    const t = S.templates.find(t=>t.id===plan);
    h += `<div class="card"><h2>Today</h2>
      <div class="big">${esc(t.name)}</div>
      <div class="sub">${t.slots.length} exercises</div>
      <div style="margin-top:12px"><button class="btn" onclick="startSession('${t.id}')">Start ${esc(t.name)}</button></div></div>`;
  }

  /* -- training block -- */
  const blk = activeBlock();
  if(blk){
    const pct = Math.min(100, blk.week/blk.weeks*100);
    h += `<div class="card"><div class="spread"><h2>Training block</h2>
        <span class="delta flat">week ${blk.week}/${blk.weeks}</span></div>
      <div class="big" style="font-size:20px; text-transform:capitalize">${esc(blk.type)}</div>
      <div class="bar"><div style="width:${pct}%"></div></div></div>`;
  }

  /* -- backup guardrail -- */
  const age = backupAgeDays();
  const isSunday = new Date().getDay()===0;
  const sundayDue = isSunday && S.settings.lastExportAt !== todayISO();
  if(backupOverdue() || sundayDue){
    h += `<div class="card" style="border-color:rgba(224,185,90,.5)">
      <div class="spread"><h2 style="color:var(--warn)">Backup ${sundayDue?"— Sunday ritual":"overdue"}</h2>
        <span class="delta warn">${age===null?"never exported":age+"d ago"}</span></div>
      <div class="note">Your data lives only on this phone. Export now, then save the file
        to iCloud Drive or Google Drive via the Files app.</div>
      <div style="margin-top:10px"><button class="btn" onclick="exportData()">Export backup (.json)</button></div></div>`;
  }

  /* -- this week: deterministic facts -- */
  const [wf, wt] = weekRange(todayISO());
  const thisW = setsInRange(wf, wt);
  const lastW = setsInRange(isoShift(wf,-7), isoShift(wt,-7));
  const sessionsThisWeek = S.sessions.filter(s=>s.date>=wf && s.date<=wt).length;
  const dur = avgDuration();
  h += `<div class="card"><h2>This week — the facts</h2>
    <div class="factrow"><span>Gym sessions</span><span class="factval">${sessionsThisWeek}</span></div>
    <div class="factrow"><span>Working sets</span><span class="factval">${thisW.total}
      <span style="color:var(--muted); font-weight:400">vs ${lastW.total} last wk</span></span></div>`;
  const groups = Object.entries(thisW.byGroup).sort((a,b)=>b[1]-a[1]).slice(0,4);
  for(const [g,n] of groups){
    const prev = lastW.byGroup[g]||0;
    const cls = n>prev?"up":n<prev?"down":"flat";
    h += `<div class="factrow"><span style="text-transform:capitalize">${esc(g)}</span>
      <span class="row" style="gap:8px"><span class="factval">${n} sets</span>
      <span class="delta ${cls}">${n>prev?"▲":n<prev?"▼":"―"} ${prev} last wk</span></span></div>`;
  }
  if(dur) h += `<div class="factrow"><span>Avg session (4 wks)</span>
      <span class="factval">${dur} min</span></div>`;
  h += `</div>`;

  /* -- stalled lifts (only speaks when there's something to say) -- */
  const stalls = stalledLifts();
  if(stalls.length){
    h += `<div class="card" style="border-color:rgba(224,185,90,.4)"><h2 style="color:var(--warn)">No top-set progress</h2>`;
    for(const st of stalls)
      h += `<div class="factrow" onclick="openEx('${st.exId}','today')"><span>${esc(st.name)}
          <span style="color:var(--muted); font-size:12px">(best ${st.top})</span></span>
        <span class="delta warn">${st.sessions} sessions ›</span></div>`;
    h += `<div class="note">A fact, not a verdict — context (block, sleep, effort) comes later.</div></div>`;
  }

  /* -- cardio: log + weekly progress -- */
  const todayCardio = S.cardio.filter(c=>c.date===todayISO());
  h += `<div class="card"><div class="spread"><h2>Cardio this week</h2>
      <span class="delta ${wk>=tgt?"up":"teal"}">${wk} / ${tgt} km</span></div>
    <div class="bar teal"><div style="width:${Math.min(100, tgt?(wk/tgt*100):0)}%"></div></div>
    <div class="row" style="margin-top:12px; flex-wrap:wrap; gap:8px">
      ${CARDIO_TYPES.map(t=>`<button class="chipbtn ${cardioType===t?"tealsel":""}"
        onclick="cardioType='${t}'; render();">${t}</button>`).join("")}</div>
    <div class="metrics" style="margin-top:10px">
      <div class="metric"><label>Distance km</label>
        <input type="number" inputmode="decimal" step="0.1" placeholder="—" id="ckm" onfocus="this.select()"></div>
      <div class="metric"><label>Minutes</label>
        <input type="number" inputmode="numeric" placeholder="—" id="cmin" onfocus="this.select()"></div>
    </div>
    <div style="margin-top:10px"><button class="btn teal" onclick="addCardio()">Log ${esc(cardioType)}</button></div>`;
  for(const c of todayCardio){
    const st = cardioStats(c);
    h += `<div class="spread" style="margin-top:10px">
      <span class="row" style="gap:8px"><span class="badge cardio">${esc(c.type)}</span>
      <span class="lastline">${c.km?c.km+" km":""}${c.km&&c.minutes?" · ":""}${c.minutes?c.minutes+" min":""}${st?" · "+st:""}</span></span>
      <button class="chipbtn" onclick="delCardio('${c.id}')">✕</button></div>`;
  }
  h += `</div>`;

  /* -- bodyweight: 7-day truth + sparkline -- */
  const bt = bwTrend();
  h += `<div class="card"><div class="spread"><h2>Bodyweight</h2>`;
  if(bt){
    const cls = bt.delta===null ? "flat" : Math.abs(bt.delta)<0.3 ? "flat" : bt.delta<0 ? "teal" : "warn";
    const lbl = bt.delta===null ? "7-day avg" :
      Math.abs(bt.delta)<0.3 ? "stable" : (bt.delta>0?"+":"")+bt.delta+" kg/wk";
    h += `<span class="delta ${cls}">${bt.avg} kg · ${lbl}</span>`;
  }
  h += `</div>${sparkline()}
    <div class="metrics" style="margin-top:10px">

    h += `<div class="card"><h2>Last session — ${esc(last.name)} · ${last.date}${last.durationMin?" · "+last.durationMin+" min":""}</h2>`;

  return h;

/* ----- SESSION ----- */

function groupedEntries(){
  const groups = [];
  S.draft.entries.forEach((en, ei)=>{
    const prev = groups[groups.length-1];
    if(en.ss && prev && prev.ss===en.ss) prev.items.push({en, ei});
    else groups.push({ss:en.ss||null, items:[{en, ei}]});
  });
  return groups;
}

function SessionScreen(){
  const d = S.draft;
  if(!d) return `<div class="empty">No session in progress.</div>`;
  const total = d.entries.reduce((n,e)=>n+e.sets.length,0);
  const done  = d.entries.reduce((n,e)=>n+e.sets.filter(s=>s.done).length,0);

  let h = `<div class="sessionhead">
    <div><div class="t">${esc(d.name)}</div>
      <div class="m"><span id="elapsed">0:00</span> · ${done}/${total} sets</div></div>
    <span class="row" style="gap:8px">
      <button class="chipbtn" onclick="restSettingsModal()">⏱ ${mmss(S.settings.restDefaultSec)}</button>
      <button class="btn" style="width:auto; padding:10px 18px; font-size:14px"
        onclick="finishSession()">Finish</button></span></div>
    <div class="hint">✓ starts the ⏱ rest timer · tap ⏱ above to change the rest time ·
      swipe a set left to delete it · tap a set's number to mark it a warm-up</div>`;

  for(const g of groupedEntries()){
    h += `<div class="card">`;
    if(g.items.length>1) h += `<span class="ssflag">SUPERSET</span>`;
    g.items.forEach(({en, ei})=>{
      const ex = exById(en.exerciseId);
      const last = lastEntryFor(en.exerciseId, null);
      const lastTxt = last
        ? "Last: " + last.entry.sets.map(s=>(s.isWarmup?"w":"")+fmtW(s.weightKg)+"×"+s.reps).join("  ")
        : "First time logging this";
      h += `<div class="exblock"><div class="spread">
        <div><div class="exname" onclick="openEx('${en.exerciseId}','session')">${esc(ex?.name ?? "?")}
          ${en.rr?`<span class="lastline" style="display:inline"> · target ${esc(en.rr)}</span>`:""}</div>
        <div class="lastline">${esc(lastTxt)}</div>
        ${ex && ex.note ? `<div class="noteline">✎ ${esc(ex.note)}</div>` : ""}</div>
        <span class="row" style="gap:6px; flex:none">
          <button class="chipbtn" onclick="checkAll(${ei})">✓ all ⏱</button>
          <button class="chipbtn" onclick="exMenu(${ei})">⋯</button></span></div>`;
      en.sets.forEach((s, si)=>{
        h += `<div class="setrow ${s.done?"done":""}" data-ei="${ei}" data-si="${si}">
          <button class="setnum ${s.isWarmup?"warm":""}" style="background:none;border:none"
            onclick="toggleWarm(${ei},${si})">${s.isWarmup?"W":si+1}</button>
          <button class="step" onclick="bump(${ei},${si},'weightKg',-2.5)">−</button>
          <input class="val" type="number" inputmode="decimal" step="0.5" onfocus="this.select()"
            value="${s.weightKg}" onchange="setVal(${ei},${si},'weightKg',this.value)">
          <span class="unit">kg</span>
          <button class="step" onclick="bump(${ei},${si},'weightKg',2.5)">＋</button>
          <button class="step" onclick="bump(${ei},${si},'reps',-1)">−</button>
          <input class="val reps" type="number" inputmode="numeric" onfocus="this.select()"
            value="${s.reps}" onchange="setVal(${ei},${si},'reps',this.value)">
          <button class="step" onclick="bump(${ei},${si},'reps',1)">＋</button>
          <button class="check" onclick="toggleDone(${ei},${si})">✓<span class="tclk">⏱</span></button>
        </div>`;
      });
      h += `<button class="addset" onclick="addSet(${ei})">+ Add set</button></div>`;
    });
    h += `</div>`;
  }

  h += `<button class="btn secondary" onclick="addExercise()">+ Add exercise</button>
        <div style="height:10px"></div>
        <button class="btn danger" onclick="discardSession()">Discard session</button>`;
  return h;
}

function SummaryScreen(){
  const s = lastSummary;
  if(!s) return `<div class="empty">Nothing to show.</div>`;
  const sess = S.sessions.find(x=>x.id===s.sessionId);
  let h = `<h1 class="screen">Session complete</h1>
  <div class="card"><h2>${esc(s.name)} · ${s.date}</h2>
    <div class="sumgrid">
      <div class="sumbox"><div class="v">${s.durationMin ?? "—"}</div><div class="k">minutes</div></div>
      <div class="sumbox"><div class="v">${s.sets}</div><div class="k">sets logged</div></div>
      <div class="sumbox"><div class="v">${s.tonnage.toLocaleString()}</div><div class="k">kg tonnage</div></div>
      <div class="sumbox"><div class="v">${s.ups}</div><div class="k">exercises beaten</div></div>
    </div></div>`;

  /* check-in: ten seconds now, permanent context for the analyst later */
  h += `<div class="card"><h2>How was it?</h2>
    <div class="rate">${[1,2,3,4,5].map(n=>
      `<button class="${sess&&sess.rating===n?"sel":""}" onclick="rateSession(${n})">${n}</button>`).join("")}</div>

    <div style="margin-top:10px"><button class="btn secondary" onclick="flagIssue()">
      ${sess&&sess.flag ? "⚑ "+esc(sess.flag) : "⚑ Flag an issue (pain, niggle, anything off)"}</button></div></div>`;

  if(s.deltas.length){
    h += `<div class="card"><h2>vs last time</h2>`;
    for(const d of s.deltas)
      h += `<div class="spread" style="margin-top:9px">
        <span style="font-size:14px">${esc(d.name)}</span>
        <span class="delta ${d.cls}">${d.label}</span></div>`;
    h += `</div>`;
  }
  if(s.skips.length){
    h += `<div class="card"><h2>Skipped / swapped</h2>`;
    for(const k of s.skips){
      const to = k.swappedToId ? " → "+esc(exById(k.swappedToId)?.name ?? "?") : "";
      h += `<div class="spread" style="margin-top:9px">
        <span style="font-size:14px">${esc(exById(k.exerciseId)?.name ?? "?")}${to}</span>

    }

      <div style="margin-top:10px"><button class="btn" onclick="exportData(); render();">Export backup (.json)</button></div></div>`;
  }
  h += `<button class="btn secondary" onclick="go('today')">Done</button>`;
  return h;
}

function newTemplate(){
  const id = "t"+Date.now();

}

function TEditScreen(){
  const t = S.templates.find(x=>x.id===editTid);
  if(!t) return `<div class="empty">Template not found.</div>`;
  let h = `<div class="spread" style="margin:6px 4px 14px">

  <div class="card"><h2>Name</h2>
    <input class="textbox" style="margin-top:8px" value="${esc(t.name)}"
      onchange="tRename(this.value)"></div>
  <div class="card"><h2>Exercises · sets · rep target</h2>`;
  t.slots.forEach((sl, i)=>{
    const ex = exById(sl.exerciseId);
    h += `<div class="exblock"><div class="spread">
      <div class="exname" style="font-size:15px">${esc(ex?.name ?? "?")}</div>
      <span class="row" style="gap:6px; flex:none">
        <button class="chipbtn" onclick="tMove(${i},-1)">↑</button>
        <button class="chipbtn" onclick="tMove(${i},1)">↓</button>
        <button class="chipbtn" style="color:var(--down)" onclick="tRemove(${i})">✕</button></span></div>
      <div class="row" style="margin-top:8px; gap:14px">
        <span class="row" style="gap:6px">
          <button class="step" style="width:30px; height:36px" onclick="tSets(${i},-1)">−</button>
          <span class="val" style="min-width:24px; font-size:15px">${sl.targetSets}</span>
          <button class="step" style="width:30px; height:36px" onclick="tSets(${i},1)">＋</button>
          <span class="unit">sets</span></span>
        <input class="textbox" style="width:90px; padding:8px 10px; font-size:14px"
          placeholder="e.g. 8-12" value="${sl.targetRepRange?esc(sl.targetRepRange):""}"
          onchange="tReps(${i}, this.value)">
        <span class="unit">reps</span></div></div>`;
  });
  h += `</div>
  <button class="btn secondary" onclick="tAdd()">＋ Add exercise</button>
  <div style="height:10px"></div>
  <button class="btn danger" onclick="tDelete()">Delete template</button>`;
  return h;
}
function tpl(){ return S.templates.find(x=>x.id===editTid); }
function tRename(v){ const t=tpl(); t.name = v.trim() || t.name; save(); }
function tMove(i, d){
  const s = tpl().slots;
  const j = i + d;
  if(j<0 || j>=s.length) return;
  [s[i], s[j]] = [s[j], s[i]];
  save(); render();
}
function tRemove(i){
  if(!confirm("Remove this exercise from the template? (History is untouched.)")) return;
  tpl().slots.splice(i,1); save(); render();
}
function tSets(i, d){
  const sl = tpl().slots[i];
  sl.targetSets = Math.min(10, Math.max(1, sl.targetSets + d));
  save(); render();
}
function tReps(i, v){
  tpl().slots[i].targetRepRange = v.trim() || null; save();
}
function tAdd(){
  pickExercise(exId=>{
    tpl().slots.push({exerciseId:exId, targetSets:3, targetRepRange:null, ss:null});
    save(); render();
  }, "Add to template");
}
function tDelete(){
  if(S.templates.length<=1){ alert("Keep at least one template."); return; }
  if(!confirm("Delete this whole template? (Logged sessions are untouched.)")) return;
  S.templates = S.templates.filter(x=>x.id!==editTid);
  save(); go("templates");
}

function restDefault(d){
  S.settings.restDefaultSec = Math.max(30, S.settings.restDefaultSec + d);
  save(); render();
}
/* In-session rest control: change the default without leaving the session.
   If a countdown is running, it keeps its current end time; the new
   default applies from the next set onward. */
function restSettingsModal(){
  openModal(`<h3>Rest between sets</h3>
    <div class="row" style="justify-content:center; gap:16px; margin:10px 0">
      <button class="step" style="width:56px; height:56px; font-size:26px"
        onclick="restModalAdj(-30)">−</button>
      <span class="val" id="restmodalval" style="font-size:30px; min-width:96px">${mmss(S.settings.restDefaultSec)}</span>
      <button class="step" style="width:56px; height:56px; font-size:26px"
        onclick="restModalAdj(30)">＋</button></div>
    <div class="note" style="text-align:center">Every timer from now on starts at this.
      A running countdown isn't interrupted.</div>
    <div style="height:14px"></div>
    <button class="btn" onclick="closeModal(); render();">Done</button>`);
}
function restModalAdj(d){
  S.settings.restDefaultSec = Math.max(30, S.settings.restDefaultSec + d);
  save();
  $("#restmodalval").textContent = mmss(S.settings.restDefaultSec);
}

/* ---------- 8. ACTIONS ---------- */

function setMetric(field, val){
  const m = metricsFor(todayISO());
  const n = Number(val);
  m[field] = val==="" || isNaN(n) ? null : Math.max(0, n);
  save(); render();
}

/* -- cardio -- */
function addCardio(){
  const km  = Number($("#ckm").value);
  const min = Number($("#cmin").value);
  const kmOk  = !isNaN(km)  && km  > 0;
  const minOk = !isNaN(min) && min > 0;
  if(!kmOk && !minOk){ alert("Enter a distance, minutes, or both."); return; }
  S.cardio.push({id:"c"+Date.now(), date:todayISO(), type:cardioType,
    km: kmOk ? Math.round(km*10)/10 : null,
    minutes: minOk ? Math.round(min) : null});
  save(); render();
}
function delCardio(id){
  if(!confirm("Remove this cardio entry?")) return;
  S.cardio = S.cardio.filter(c=>c.id!==id);
  save(); render();
}

/* -- training blocks -- */
let blockType = "cut";
let blockWeeks = 12;
function blockWeeksAdj(d){
  blockWeeks = Math.min(52, Math.max(1, blockWeeks + d));
  $("#blockweeks").textContent = blockWeeks;
}
function startBlock(){
  S.blocks.push({id:"b"+Date.now(), type:blockType, startDate:todayISO(),
    weeks:blockWeeks, endedAt:null});
  save(); render();
}
function endBlock(){
  if(!confirm("End the current training block?")) return;
  const blk = activeBlock();
  const b = S.blocks.find(x=>x.id===blk.id);
  if(b) b.endedAt = todayISO();
  save(); render();
}

/* -- gym session -- */
function startSession(templateId){
  if(S.draft && !confirm("Discard the session in progress and start a new one?")) return;
  const t = S.templates.find(t=>t.id===templateId);
  const entries = t.slots.map(slot=>({
    exerciseId: slot.exerciseId, ss: slot.ss||null,
    rr: slot.targetRepRange||null,
    sets: prefillSets(slot.exerciseId, slot.targetSets)
  }));
  S.draft = {id:"s"+Date.now(), date:todayISO(), templateId, name:t.name,
    notes:null, startedAt:Date.now(), skips:[], entries};
  go("session");
}
function prefillSets(exId, n){
  const last = lastEntryFor(exId, null);
  const sets = [];
  for(let i=0; i<n; i++){
    const prev = last ? (last.entry.sets[i] || last.entry.sets[last.entry.sets.length-1]) : null;
    sets.push({weightKg: prev? prev.weightKg : 0, reps: prev? prev.reps : 8,
               effort:null, isWarmup:false, done:false});
  }
  return sets;
}

/* Cascade: setting a weight/reps copies it forward to every LATER set in
   the same exercise that isn't ticked yet — set 1 at 12.5 kg means sets
   2–4 follow automatically. Ticked sets are never touched. */
function cascade(ei, si, field, val){
  const sets = S.draft.entries[ei].sets;
  for(let j=si+1; j<sets.length; j++){
    if(!sets[j].done) sets[j][field] = val;
  }
}
function bump(ei, si, field, amt){
  const s = S.draft.entries[ei].sets[si];
  s[field] = Math.max(0, Math.round((Number(s[field])+amt)*10)/10);
  s.done = true;
  cascade(ei, si, field, s[field]);
  render();
}
function setVal(ei, si, field, v){
  const s = S.draft.entries[ei].sets[si];
  const n = Number(v);
  s[field] = isNaN(n) ? s[field] : Math.max(0, n);
  s.done = true;
  cascade(ei, si, field, s[field]);
  render();
}
function toggleDone(ei, si){
  const s = S.draft.entries[ei].sets[si];
  s.done = !s.done;
  if(s.done) restStart(S.settings.restDefaultSec);
  render();
}
function toggleWarm(ei, si){
  const s = S.draft.entries[ei].sets[si];
  s.isWarmup = !s.isWarmup;
  render();
}
function checkAll(ei){
  S.draft.entries[ei].sets.forEach(s=>s.done=true);
  restStart(S.settings.restDefaultSec);
  render();
}
function addSet(ei){
  const sets = S.draft.entries[ei].sets;
  const prev = sets[sets.length-1] || {weightKg:0, reps:8};
  sets.push({weightKg:prev.weightKg, reps:prev.reps, effort:null, isWarmup:false, done:false});
  render();
}
function removeSet(ei, si){
  S.draft.entries[ei].sets.splice(si, 1);
  render();
}

/* Swipe a set row left to delete it. Horizontal intent only — vertical
   movement cancels, so normal scrolling is unaffected. */
let swipe = null;
document.addEventListener("touchstart", e=>{
  const row = e.target.closest && e.target.closest(".setrow");
  if(!row || view!=="session") { swipe=null; return; }
  swipe = {row, x:e.touches[0].clientX, y:e.touches[0].clientY, dx:0, dead:false};
}, {passive:true});
document.addEventListener("touchmove", e=>{
  if(!swipe || swipe.dead) return;
  const dx = e.touches[0].clientX - swipe.x;
  const dy = e.touches[0].clientY - swipe.y;
  if(Math.abs(dy) > 40 && Math.abs(dy) > Math.abs(dx)){ /* it's a scroll */
    swipe.row.style.transform = ""; swipe.dead = true; return;
  }
  swipe.dx = Math.min(0, dx);
  swipe.row.style.transform = "translateX("+swipe.dx+"px)";
  swipe.row.style.transition = "none";
}, {passive:true});
document.addEventListener("touchend", ()=>{
  if(!swipe || swipe.dead){ swipe=null; return; }
  const {row, dx} = swipe;
  row.style.transition = "";
  if(dx < -70 && row.dataset.ei !== undefined){
    removeSet(Number(row.dataset.ei), Number(row.dataset.si));
  } else {
    row.style.transform = "";
  }
  swipe = null;
});

function addExercise(){
  pickExercise(exId=>{
    const asSS = S.draft.entries.length &&
      confirm("Superset this with the previous exercise?");
    let ss = null;
    if(asSS){
      const prev = S.draft.entries[S.draft.entries.length-1];
      ss = prev.ss || ("ss"+Date.now());
      prev.ss = ss;
    }
    S.draft.entries.push({exerciseId:exId, ss, sets:prefillSets(exId,3)});
    render();
  }, "Add exercise");
}

let pendingEi = null;
function swapExercise(ei){
  pendingEi = ei;
  pickExercise(newId=>{
    const oldId = S.draft.entries[pendingEi].exerciseId;
    if(newId===oldId) return;
    pickReason(`(r)=>{ doSwap('${newId}', r) }`, "Why the swap?");
  }, "Swap to which exercise?");
}
function doSwap(newId, reason){
  const en = S.draft.entries[pendingEi];
  S.draft.skips.push({exerciseId:en.exerciseId, reason, swappedToId:newId});
  en.exerciseId = newId;
  en.sets = prefillSets(newId, en.sets.length);
  render();
}
function skipExercise(ei){
  pendingEi = ei;
  pickReason(`(r)=>{ doSkip(r) }`, "Why skip it today?");
}
function doSkip(reason){
  const en = S.draft.entries[pendingEi];
  S.draft.skips.push({exerciseId:en.exerciseId, reason, swappedToId:null});
  S.draft.entries.splice(pendingEi,1);
  render();
}
function noteExercise(ei){
  const ex = exById(S.draft.entries[ei].exerciseId);
  openModal(`<h3>Note — ${esc(ex.name)}</h3>
    <div class="note" style="margin:0 0 10px">Machine settings, seat height, grip —
      shows under the exercise every session.</div>
    <input class="textbox" id="exnote" value="${ex.note?esc(ex.note):""}"
      placeholder="e.g. seat 4, narrow grip">
    <div style="height:14px"></div>
    <button class="btn" onclick="saveNote('${ex.id}')">Save note</button>`);
}
function saveNote(exId){
  const ex = exById(exId);
  const v = $("#exnote").value.trim();
  ex.note = v || null;
  save(); closeModal(); render();
}

function discardSession(){
  if(confirm("Discard this session? Nothing will be saved.")){
    S.draft=null; restStop(); go("today");
  }
}

function finishSession(){
  const d = S.draft;
  const entries = d.entries
    .map(en=>({exerciseId:en.exerciseId, ss:en.ss||null,
      sets:en.sets.filter(s=>s.done).map(s=>({weightKg:s.weightKg, reps:s.reps,
        effort:s.effort, isWarmup:s.isWarmup}))}))
    .filter(en=>en.sets.length);
  if(!entries.length){
    alert("No sets are ticked ✓ yet. Tick the sets you completed, or discard the session.");
    return;
  }
  const skipped = d.entries.reduce((n,en)=>n+en.sets.filter(s=>!s.done).length,0);
  if(skipped && !confirm(skipped+" unticked set(s) will be dropped. Finish anyway?")) return;
  const durationMin = d.startedAt ? Math.max(1, Math.round((Date.now()-d.startedAt)/60000)) : null;

  const deltas = entries.map(en=>({
    name: exById(en.exerciseId)?.name ?? "?",
    ...(deltaFor(en.exerciseId, en.sets, null) || {cls:"flat", label:"—"})
  }));
  lastSummary = {
    sessionId: d.id,
    name:d.name, date:d.date, durationMin,
    sets: entries.reduce((n,e)=>n+e.sets.length,0),
    tonnage: tonnage(entries),
    ups: deltas.filter(x=>x.cls==="up").length,
    deltas, skips:[...(d.skips||[])]
  };

  S.sessions.push({id:d.id, date:d.date, templateId:d.templateId, name:d.name,
    notes:d.notes, durationMin, rating:null, flag:null, skips:d.skips||[], entries});
  S.draft = null;
  restStop();
  go("summary");
}

/* ---------- 9. BACKUP ---------- */

function download(name, text, type){
  const blob = new Blob([text], {type});
  const a = document.createElement("a");
  a.href = URL.createObjectURL(blob);
  a.download = name;
  document.body.appendChild(a); a.click(); a.remove();
}
function exportData(){
  download("repcheck-export-"+todayISO()+".json", JSON.stringify(S, null, 2), "application/json");
  S.settings.lastExportAt = todayISO();
  save(); render();
}
function csvCell(v){
  v = v===null||v===undefined ? "" : String(v);
  return /[",\n]/.test(v) ? '"'+v.replace(/"/g,'""')+'"' : v;
}
function exportCSV(){
  const rows = [["date","kind","session","exercise_or_type","set","warmup","weight_kg","reps","km","minutes","bodyweight_kg","sleep_h","rating","flag"]];
  for(const sess of [...S.sessions].sort((a,b)=>a.date.localeCompare(b.date))){
    for(const en of sess.entries){
      const name = exById(en.exerciseId)?.name ?? en.exerciseId;
      en.sets.forEach((s,i)=>rows.push(
        [sess.date,"set",sess.name,name,i+1,s.isWarmup?1:0,s.weightKg,s.reps,"","","","",sess.rating??"",sess.flag??""]));
    }
  }
  for(const c of [...S.cardio].sort((a,b)=>a.date.localeCompare(b.date))){
    rows.push([c.date,"cardio","",c.type,"","","","",c.km??"",c.minutes??"","","","",""]);
  }
  for(const m of [...S.dailyMetrics].sort((a,b)=>a.date.localeCompare(b.date))){
    if(m.bodyweightKg!==null && m.bodyweightKg!==undefined || m.sleepHours!==null && m.sleepHours!==undefined)
      rows.push([m.date,"metric","","","","","","","","",m.bodyweightKg??"",m.sleepHours??"","",""]);
  }
  const csv = rows.map(r=>r.map(csvCell).join(",")).join("\n");
  download("repcheck-data-"+todayISO()+".csv", csv, "text/csv");
}
function importData(file){
  if(!file) return;
  const r = new FileReader();
  r.onload = () => {
    try{
      const data = JSON.parse(r.result);
      if(!data.sessions || !data.exercises) throw new Error("not a RepCheck file");
      if(confirm("Replace ALL current data with this backup?")){
        S = migrate(data); save(); go("today");
      }
    }catch(e){ alert("That file couldn't be read as a RepCheck backup."); }
  };
  r.readAsText(file);
}
function resetAll(){
  if(confirm("Erase ALL RepCheck data on this phone? Export first if unsure.")
     && confirm("Really erase everything? This cannot be undone.")){
    S = seed(); save(); go("today");
  }
}

  navigator.serviceWorker.register("sw.js").catch(()=>{});
}
try{ navigator.storage && navigator.storage.persist && navigator.storage.persist(); }catch(e){}
